services:
  iamq:
    build: ./iamq
    restart: unless-stopped
    environment:
      IAMQ_HTTP_URL: http://host.docker.internal:18790
      IAMQ_WS_URL: ws://host.docker.internal:18793/ws
      IAMQ_AGENT_ID: main
      IAMQ_AGENT_NAME: Main Agent
      IAMQ_AGENT_EMOJI: "🧠"
      IAMQ_AGENT_DESC: "Orchestrator: monitors all agents via IAMQ, dispatches info to user via Telegram"
      IAMQ_AGENT_CAPABILITIES: orchestrate,monitor_agents,dispatch_notifications,document_interactions
    extra_hosts:
      - "host.docker.internal:host-gateway"

  iamq_bindings:
    build:
      context: ./tools/iamq_bindings
    profiles:
      - dev

  pipeline_runner:
    build:
      context: ./tools/pipeline_runner
    env_file: .env

  arch-cli:
    build:
      context: ./tools/arch-cli
    volumes:
      - ./.archgate:/app/.archgate
