<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <circle cx="250" cy="250" r="230" fill="#2C3E50" opacity="0.12"/>
  <circle cx="250" cy="250" r="230" fill="none" stroke="#2C3E50" stroke-width="3" opacity="0.3"/>
  <g transform="translate(70, 70) scale(2.8)">
  <!-- Tail -->
  <polygon points="64,96 54,112 74,112" fill="#E8453C"/>
  <polygon points="64,108 58,118 70,118" fill="#D63C34"/>
  <!-- Body -->
  <ellipse cx="64" cy="72" rx="28" ry="24" fill="#E8453C"/>
  <ellipse cx="64" cy="78" rx="18" ry="14" fill="#F4A39C"/>
  <!-- Claw arms -->
  <rect x="36" y="48" width="10" height="18" rx="4" fill="#E8453C" transform="rotate(-20 41 57)"/>
  <rect x="82" y="48" width="10" height="18" rx="4" fill="#E8453C" transform="rotate(20 87 57)"/>
  <!-- Left claw -->
  <circle cx="30" cy="45" r="14" fill="#E8453C"/>
  <circle cx="30" cy="45" r="9" fill="#F4A39C"/>
  <!-- Right claw -->
  <circle cx="98" cy="45" r="14" fill="#E8453C"/>
  <circle cx="98" cy="45" r="9" fill="#F4A39C"/>
  <!-- Eyes -->
  <circle cx="54" cy="60" r="7" fill="white"/>
  <circle cx="74" cy="60" r="7" fill="white"/>
  <circle cx="56" cy="60" r="3" fill="#222"/>
  <circle cx="76" cy="60" r="3" fill="#222"/>
  <circle cx="54" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="74" cy="58" r="1.5" fill="white" opacity="0.8"/>
  <!-- Antennae -->
  <path d="M58,52 Q52,30 42,22" stroke="#E8453C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M70,52 Q76,30 86,22" stroke="#E8453C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="22" r="2.5" fill="#F4A39C"/>
  <circle cx="86" cy="22" r="2.5" fill="#F4A39C"/>
  <!-- Smile -->
  <path d="M58,70 Q64,76 70,70" stroke="#C0392B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="48" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <ellipse cx="80" cy="70" rx="4" ry="2.5" fill="#F4A39C" opacity="0.6"/>
  <!-- Crown on head -->
  <polygon points="50,48 54,36 58,44 64,32 70,44 74,36 78,48" fill="#F1C40F"/>
  <rect x="50" y="46" width="28" height="4" rx="1" fill="#F1C40F"/>
  <circle cx="54" cy="39" r="1.5" fill="#E74C3C"/>
  <circle cx="64" cy="35" r="1.5" fill="#3498DB"/>
  <circle cx="74" cy="39" r="1.5" fill="#2ECC71"/>
  <!-- Conductor baton in right claw -->
  <line x1="100" y1="40" x2="116" y2="20" stroke="#4A3728" stroke-width="2" stroke-linecap="round"/>
  <circle cx="116" cy="19" r="2" fill="white"/>
  </g>
</svg>
