name: "SoftwareFactory"
description: "A DORA-compliant, Persona-driven software development team."
model: "claude-3-5-sonnet"

env:
  PERSONA_DIR: "REDACTED_PATH/.openclaw/workspace/factory/personas"
  GOVERNANCE_FILE: "REDACTED_PATH/.openclaw/workspace/factory/governance/scopes.json"

skills:
  - name: "switch_persona"
    description: "Loads the mental model for a specific role. REQUIRED when changing phases."
    command: "cat $PERSONA_DIR/{{role}}.md"

  - name: "write_scoped_code"
    description: "Writes code. ENFORCES SCOPE. Usage: write_scoped_code <active_stack> <path> <content>"
    command: "python3 REDACTED_PATH/.openclaw/workspace/factory/scripts/secure_writer.py {{active_stack}} {{path}} \"{{content}}\""

  - name: "secure_commit"
    description: "Commits changes. Usage: secure_commit <active_stack> <type> <scope> <message>"
    command: "python3 REDACTED_PATH/.openclaw/workspace/factory/scripts/secure_commit.py {{active_stack}} {{type}} {{scope}} \"{{message}}\""

  - name: "run_test_suite"
    description: "Runs tests for the specific stack. Usage: run_test_suite <stack>"
    command: "python3 REDACTED_PATH/.openclaw/workspace/factory/scripts/test_runner.py {{stack}}"

  - name: "verify_docs"
    description: "Checks if README examples actually run (Doctest)."
    command: "python3 REDACTED_PATH/.openclaw/workspace/factory/scripts/doc_verifier.py"

  - name: "check_git_history"
    description: "Analyzes semantic history of a file."
    command: "git blame -L {{lines}} --show-email {{path}}"

system_prompt_path: "REDACTED_PATH/.openclaw/workspace/factory/SOUL.md"
