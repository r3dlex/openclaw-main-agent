name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: iamq_bindings
            command: mix test
          - name: pipeline_runner
            command: poetry run pytest
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Build containers
        run: docker compose build

      - name: Run ${{ matrix.service.name }} tests
        run: docker compose run --rm ${{ matrix.service.name }} ${{ matrix.service.command }}

  docs:
    name: Elixir Docs (iamq_bindings)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/iamq_bindings
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.15"
          otp-version: "26"

      - name: Install dependencies
        run: mix deps.get

      - name: Generate docs
        run: mix docs
